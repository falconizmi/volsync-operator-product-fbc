apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/stolostron/volsync-operator-product-fbc?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/pull_request_number: '{{pull_request_number}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/cancel-in-progress: "true"
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-cel-expression: event == "pull_request" && target_branch == "dev" &&
      (".tekton/volsync-fbc-validate-bundle-images-dev-pull-request.yaml".pathChanged() ||
      "catalog-template.yaml".pathChanged() ||
      "build/validate-bundle-images.sh".pathChanged())
  creationTimestamp: null
  labels:
    appstudio.openshift.io/application: volsync-fbc-dev
    pipelines.appstudio.openshift.io/type: test
  name: volsync-fbc-validate-bundle-images-dev-on-pull-request
  namespace: volsync-tenant
spec:
  params:
    - name: git-url
      value: '{{source_url}}'
    - name: revision
      value: '{{revision}}'
  pipelineSpec:
    params:
      - name: git-url
        type: string
      - name: revision
        type: string
    workspaces:
      - name: source
      - name: git-auth
    tasks:
      - name: validate-bundle-images
        params:
          - name: git-url
            value: $(params.git-url)
          - name: revision
            value: $(params.revision)
        workspaces:
          - name: source
            workspace: source
          - name: git-auth
            workspace: git-auth
        taskSpec:
          params:
            - name: git-url
              type: string
            - name: revision
              type: string
          workspaces:
            - name: source
            - name: git-auth
          volumes:
            - name: registry-auth
              secret:
                secretName: volsync-redhat-registries-pull-secret
                items:
                  - key: .dockerconfigjson
                    path: auth.json
          steps:
            - name: validate
              image: registry.access.redhat.com/ubi9/ubi:latest
              workingDir: $(workspaces.source.path)
              env:
                - name: PARAM_URL
                  value: $(params.git-url)
                - name: PARAM_REVISION
                  value: $(params.revision)
                - name: REGISTRY_AUTH_FILE
                  value: /etc/containers/auth/auth.json
              volumeMounts:
                - name: registry-auth
                  mountPath: /etc/containers/auth
                  readOnly: true
              script: |
                #!/bin/bash
                set -eo pipefail

                echo "=== Installing tools ==="
                dnf install -y --quiet git skopeo jq

                YQ_VERSION="v4.44.3"
                curl -sSL \
                  "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" \
                  -o /usr/local/bin/yq
                chmod +x /usr/local/bin/yq

                OPM_VERSION=$(curl -sSL https://api.github.com/repos/operator-framework/operator-registry/releases/latest | jq -r '.tag_name')
                curl -sSL \
                  "https://github.com/operator-framework/operator-registry/releases/download/${OPM_VERSION}/linux-amd64-opm" \
                  -o /usr/local/bin/opm
                chmod +x /usr/local/bin/opm

                echo ""
                echo "=== Cloning repository ==="
                git clone --depth=1 "${PARAM_URL}" .
                git fetch --depth=1 origin "${PARAM_REVISION}"
                git checkout "${PARAM_REVISION}"

                echo ""
                bash build/validate-bundle-images.sh
  workspaces:
    - name: source
      emptyDir: {}
    - name: git-auth
      secret:
        secretName: '{{ git_auth_secret }}'
status: {}
